 clasic_esotericism: "Класический Езотеризм"
 clasic_esotericism_desc: "Классический эзотеризм фокусируется на древних тайных знаниях, мистических практиках и алхимии. Цель – внутреннее просветление и понимание законов вселенной через символы, ритуалы и духовные практики."
 etno_esotericism: "Етно-Езотеризм"
 etno_esotericism_desc: "Этно-эзотеризм сочетает духовные практики с культурными традициями конкретного народа. В основе лежат мифы, фольклор и шаманские обряды, которые помогают соединить человека с природой и его предками."
 spiritualism_desc: "Спиритуализм сосредоточен на контакте с духами и потусторонним миром. Практики включают медиумизм, сеансы общения с душами умерших и исследование загробной жизни с целью получения знаний и совета."
 spiritualism: "Спиритуализм"
 satanism_desc: "Сатанизм рассматривается как философия или культ, фокусирующийся на личной свободе, отказе от традиционных религиозных норм и почитании архетипа Сатаны как символа силы, знания и самореализации."
 satanism: "Сатанизм"
 holly_desc: "Святость подразумевает веру в чистоту, божественное провидение и моральные законы, направленные на гармонию с высшими силами. Практикующие стремятся к духовной чистоте и защите от злых влияний."
 holly: "Святость"